name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "ERROR: secrets.EC2_HOST is not set"; exit 1; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "ERROR: secrets.EC2_USER is not set"; exit 1; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "ERROR: secrets.EC2_SSH_KEY is not set"; exit 1; fi
          if [ -z "${{ secrets.EC2_BACKEND_REMOTE_PATH }}" ]; then echo "ERROR: secrets.EC2_BACKEND_REMOTE_PATH is not set"; exit 1; fi

      - name: Install and validate backend dependencies
        working-directory: ./backend
        run: |
          set -euo pipefail
          npm install --omit=dev --no-package-lock

      - name: Prepare remote backend directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            sudo rm -rf "${{ secrets.EC2_BACKEND_REMOTE_PATH }}"
            sudo mkdir -p "${{ secrets.EC2_BACKEND_REMOTE_PATH }}"
            sudo chown -R "${{ secrets.EC2_USER }}":"${{ secrets.EC2_USER }}" "${{ secrets.EC2_BACKEND_REMOTE_PATH }}"

      - name: Copy backend to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "backend"
          target: "${{ secrets.EC2_BACKEND_REMOTE_PATH }}"
          strip_components: 1

      - name: Install backend dependencies on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_BACKEND_REMOTE_PATH }}"
            pwd
            ls -la
            npm ci --production
            sudo chown -R "${{ secrets.EC2_USER }}":"${{ secrets.EC2_USER }}" .

      - name: Restart backend service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_BACKEND_REMOTE_PATH }}"
            pm2 restart imperial-backend || pm2 start server.js --name imperial-backend
