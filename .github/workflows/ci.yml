name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            backend/package-lock.json

      # Client Checks
      - name: Install Client Dependencies
        run: npm ci
        working-directory: ./client

      - name: Lint Client
        run: npm run lint
        working-directory: ./client

      - name: Build Client
        run: npm run build
        working-directory: ./client

      # Backend Checks
      - name: Install Backend Dependencies
        run: npm ci
        working-directory: ./backend
