name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "ERROR: secrets.EC2_HOST is not set"; exit 1; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "ERROR: secrets.EC2_USER is not set"; exit 1; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "ERROR: secrets.EC2_SSH_KEY is not set"; exit 1; fi
          if [ -z "${{ secrets.EC2_REMOTE_PATH }}" ]; then echo "ERROR: secrets.EC2_REMOTE_PATH is not set"; exit 1; fi
          if [ -z "${{ secrets.EC2_NGINX_RELOAD_CMD }}" ]; then echo "ERROR: secrets.EC2_NGINX_RELOAD_CMD is not set"; exit 1; fi

      - name: Install and build client
        working-directory: ./client
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            sudo rm -rf "${{ secrets.EC2_REMOTE_PATH }}"
            sudo mkdir -p "${{ secrets.EC2_REMOTE_PATH }}"
            sudo chown -R "${{ secrets.EC2_USER }}":"${{ secrets.EC2_USER }}" "${{ secrets.EC2_REMOTE_PATH }}"

      - name: Copy build to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "client/dist"
          target: "${{ secrets.EC2_REMOTE_PATH }}"
          strip_components: 2

      - name: Set permissions and restart nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            sudo chown -R www-data:www-data "${{ secrets.EC2_REMOTE_PATH }}"
            ${{ secrets.EC2_NGINX_RELOAD_CMD }}
